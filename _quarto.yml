project:
  type: website
  output-dir: docs
  render:
    - nordstat2026/index.qmd

knitr:
  opts_knit:
    verbose: false
  #output-dir: docs

website:
  title: "Seminars"
  navbar:
    logo: /misc/SU_logo_small.png
    background: primary
    left:
      - href: nordstat2026/index.qmd
        text: NordStat2026
        
format:
  html:
    theme:
      light: lumen
      dark: superhero # litera, lumen, superhero, united
    css: styles.css
    toc: true
    toc-title: Sections
    #monobackgroundcolor: #c3d0e6
  revealjs:
    center: true
    slide-number: true
    height: 1200
    width: 2000
    transition: none #convex
    transition-speed: slow
    preview-links: auto
    toc: false
    progress: true
    citations-hover: false
    logo: ../misc/SU_logotyp_Liggande_1000px.png
    footnotes-hover: true
callout-appearance: default




